name: Cross Browser Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'requirements.txt'

      - name: Login to GHCR
        if: steps.filter.outputs.docker == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push
        if: steps.filter.outputs.docker == 'true'
        run: |
          # Нижний регистр для Docker
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/cross-browser-tests:latest
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_ID .
          docker push $IMAGE_ID

  test:
    runs-on: ubuntu-latest
    needs: build-image
    if: always() && needs.build-image.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    services:
      chrome:
        image: ${{ matrix.browser == 'chrome' && 'selenium/standalone-chrome:latest' || '' }}
        ports:
          - 4444:4444
      firefox:
        image: ${{ matrix.browser == 'firefox' && 'selenium/standalone-firefox:latest' || '' }}
        ports:
          - 4445:4444
      edge:
        image: ${{ matrix.browser == 'edge' && 'selenium/standalone-edge:latest' || '' }}
        ports:
          - 4446:4444

    container:
      image: ghcr.io/andrets/cross-browser-tests:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          pytest tests/ --alluredir=allure-results-${{ matrix.browser }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results-${{ matrix.browser }}

  # Отдельная джоба для сборки общего отчета после всех тестов
  report:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andrets/cross-browser-tests:latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure Report
        run: allure generate all-results -o allure-report --clean

      # Публикация в ветку gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: full-allure-report
          path: allure-report/
