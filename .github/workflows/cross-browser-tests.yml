name: Cross Browser Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/test-env:latest
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        env:
          BROWSER: ${{ matrix.browser }}
        run: |
          # запускает виртуальный дисплей для headless режима
          Xvfb :99 -screen 0 1920x1080x24 &
          pytest tests/ --alluredir=allure-results-${{ matrix.browser }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results-${{ matrix.browser }}

  # Отдельная джоба для сборки общего отчета после всех тестов
  report:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/test-env:latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure Report
        run: allure generate all-results -o allure-report --clean

      # Публикация в ветку gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: full-allure-report
          path: allure-report/
