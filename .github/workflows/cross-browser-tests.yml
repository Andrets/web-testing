name: Cross Browser Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'requirements.txt'

      - name: Login to GHCR
        if: steps.filter.outputs.docker == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push
        if: steps.filter.outputs.docker == 'true'
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/cross-browser-tests:latest
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_ID .
          docker push $IMAGE_ID

  test:
    runs-on: ubuntu-latest
    needs: build-image
    if: always() && needs.build-image.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    services:
      selenium-hub:
        image: selenium/hub:latest
        ports:
          - 4444:4444
        options: --health-cmd="curl -f http://localhost:4444/wd/hub/status || exit 1" --health-interval=10s --health-timeout=5s --health-retries=3

      selenium-chrome:
        image: selenium/node-chrome:latest
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
        options: --health-cmd="curl -f http://localhost:5555/status || exit 1" --health-interval=10s --health-timeout=5s --health-retries=3

      selenium-firefox:
        image: selenium/node-firefox:latest
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
        options: --health-cmd="curl -f http://localhost:5555/status || exit 1" --health-interval=10s --health-timeout=5s --health-retries=3

      selenium-edge:
        image: selenium/node-edge:latest
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
        options: --health-cmd="curl -f http://localhost:5555/status || exit 1" --health-interval=10s --health-timeout=5s --health-retries=3

    container:
      image: ghcr.io/andrets/cross-browser-tests:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Selenium Hub
        run: |
          for i in {1..60}; do
            if curl -f -s http://selenium-hub:4444/wd/hub/status > /dev/null; then
              echo "✓ Selenium Hub is ready!"
              break
            fi
            echo "Waiting for Selenium Hub... ($i/60)"
            sleep 1
          done

      - name: Check Selenium Grid Status
        run: |
          curl -s http://selenium-hub:4444/wd/hub/status | python3 -m json.tool

      - name: Run tests
        env:
          BROWSER: ${{ matrix.browser }}
          SELENIUM_HUB: http://selenium-hub:4444
        run: |
          pytest tests/ -v --alluredir=allure-results-${{ matrix.browser }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.matrix.browser }}
          path: allure-results-${{ matrix.browser }}

  report:
    needs: test
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andrets/cross-browser-tests:latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure Report
        run: allure generate all-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: full-allure-report
          path: allure-report/
